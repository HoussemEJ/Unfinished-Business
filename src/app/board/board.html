<div class="grid" cdkDropListGroup>
  @for (title of titles; track $index) {
    <div class="title">
      <div class="counter">
        {{ mockBoardData[$index].length }}
      </div>
      <span>{{ title }}</span>
    </div>
  }
  @for (title of titles; track $index) {
    <app-column
      cdkDropList
      [cdkDropListData]="mockBoardData[$index]"
      [cards]="mockBoardData[$index]"
      (cdkDropListDropped)="drop($event)"
    ></app-column>
  }
</div>
