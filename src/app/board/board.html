<div class="grid">
  @for (title of titles; track $index) {
    <div class="title">
      <div class="counter">
        {{ columns()[$index].length }}
      </div>
      <span>{{ title }}</span>
    </div>
  }
  @for (title of titles; track $index) {
    <app-column
      [attr.data-column-id]="$index"
      dropTarget
      [column]="{ id: $index, title: title }"
      [cards]="columns()[$index]"
    ></app-column>
  }
</div>
