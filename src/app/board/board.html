<div class="grid">
  @for (header of columnHeaders(); track $index) {
    <div class="header">
      <div class="counter">
        {{ columns()[$index].length }}
      </div>
      <span>{{ header }}</span>
    </div>
  }
  @for (header of columnHeaders(); track $index) {
    <app-column
      dropTarget
      [column]="{ id: $index, name: header }"
      [cards]="columns()[$index]"
    ></app-column>
  }
</div>
