<div class="title">
  <app-tag [label]="card().tag" color="var(--prime-500)"></app-tag>
  <span>{{ card().title }}</span>
</div>

<div class="desc">
  {{ card().description }}
</div>
<div class="prio">
  <div class="dot" [class]="priorityWeight[card().priority]"></div>
  <span>{{ card().priority }}</span>
</div>
